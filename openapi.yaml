swagger: "2.0"
info:
  version: "1.0.0"
  title: "IDUNA IAM + Registration API"
  description: |
    IDUNA VS0/VS1 API: Google OAuth + Email magic-link/OTP, THE_HONOR_CODE gating, unique gamertag,
    session management, and minimal admin moderation controls (suspend, revoke sessions, rename/reserve handles).
    All errors return a standard ApiError body. Honor-gated endpoints may return 403 HONOR_CODE_REQUIRED with honor_code payload.
schemes:
  - https
  - http
host: "api.example.com"
basePath: "/"
consumes:
  - application/json
produces:
  - application/json

securityDefinitions:
  BearerAuth:
    type: apiKey
    name: Authorization
    in: header
    description: "Bearer <token>"
  SessionCookie:
    type: apiKey
    name: iduna_session
    in: cookie
    description: "HttpOnly session cookie (optional alternative to Bearer token)"

tags:
  - name: Auth
  - name: HonorCode
  - name: Me
  - name: Gamertag
  - name: Admin

paths:
  /health:
    get:
      tags: [Auth]
      summary: "Health check"
      responses:
        200:
          description: "OK"
          schema:
            $ref: "#/definitions/HealthResponse"

  /auth/google/start:
    get:
      tags: [Auth]
      summary: "Begin Google OAuth (returns redirect URL)"
      description: |
        Returns a Google OAuth authorization URL. Frontend should redirect the user to this URL.
      parameters:
        - name: return_to
          in: query
          type: string
          required: false
          description: "Optional post-auth redirect hint (e.g. /town). Server may validate/whitelist."
      responses:
        200:
          description: "Google auth URL"
          schema:
            $ref: "#/definitions/AuthStartResponse"
        429:
          description: "Rate limited"
          schema:
            $ref: "#/definitions/ApiError"

  /auth/google/callback:
    post:
      tags: [Auth]
      summary: "Exchange Google OAuth code for session/token"
      description: |
        Exchanges OAuth authorization code for identity, creates or finds the user, and returns user + honor code gating state.
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: "#/definitions/GoogleCallbackRequest"
      responses:
        200:
          description: "Authenticated"
          schema:
            $ref: "#/definitions/AuthCompleteResponse"
        400:
          description: "Bad request / invalid code"
          schema:
            $ref: "#/definitions/ApiError"
        429:
          description: "Rate limited"
          schema:
            $ref: "#/definitions/ApiError"

  /auth/email/start:
    post:
      tags: [Auth]
      summary: "Begin email login/registration (magic link or OTP)"
      description: |
        Sends a one-time login token to email (magic link and/or OTP). Use rate limiting by IP and email.
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: "#/definitions/EmailStartRequest"
      responses:
        200:
          description: "Email sent (always return 200 to avoid user enumeration)"
          schema:
            $ref: "#/definitions/EmailStartResponse"
        429:
          description: "Rate limited"
          schema:
            $ref: "#/definitions/ApiError"

  /auth/email/verify:
    post:
      tags: [Auth]
      summary: "Verify email OTP/token and create session/token"
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: "#/definitions/EmailVerifyRequest"
      responses:
        200:
          description: "Authenticated"
          schema:
            $ref: "#/definitions/AuthCompleteResponse"
        400:
          description: "Invalid/expired token"
          schema:
            $ref: "#/definitions/ApiError"
        429:
          description: "Rate limited"
          schema:
            $ref: "#/definitions/ApiError"

  /auth/logout:
    post:
      tags: [Auth]
      summary: "Logout current session"
      security:
        - BearerAuth: []
        - SessionCookie: []
      responses:
        200:
          description: "Logged out"
          schema:
            $ref: "#/definitions/OkResponse"
        401:
          description: "Not authenticated"
          schema:
            $ref: "#/definitions/ApiError"

  /auth/logout_all:
    post:
      tags: [Auth]
      summary: "Logout all sessions for current user"
      security:
        - BearerAuth: []
        - SessionCookie: []
      responses:
        200:
          description: "All sessions revoked"
          schema:
            $ref: "#/definitions/OkResponse"
        401:
          description: "Not authenticated"
          schema:
            $ref: "#/definitions/ApiError"

  /me:
    get:
      tags: [Me]
      summary: "Get current user + honor gating state"
      security:
        - BearerAuth: []
        - SessionCookie: []
      responses:
        200:
          description: "Current user"
          schema:
            $ref: "#/definitions/MeResponse"
        401:
          description: "Not authenticated"
          schema:
            $ref: "#/definitions/ApiError"

  /honor-code/current:
    get:
      tags: [HonorCode]
      summary: "Get current THE_HONOR_CODE version"
      responses:
        200:
          description: "Current honor code"
          schema:
            $ref: "#/definitions/HonorCodeResponse"

  /honor-code/accept:
    post:
      tags: [HonorCode]
      summary: "Accept current THE_HONOR_CODE"
      security:
        - BearerAuth: []
        - SessionCookie: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: "#/definitions/HonorCodeAcceptRequest"
      responses:
        200:
          description: "Accepted"
          schema:
            $ref: "#/definitions/MeResponse"
        400:
          description: "Invalid sha256/version"
          schema:
            $ref: "#/definitions/ApiError"
        401:
          description: "Not authenticated"
          schema:
            $ref: "#/definitions/ApiError"

  /gamertag/check:
    get:
      tags: [Gamertag]
      summary: "Check gamertag availability"
      parameters:
        - name: handle
          in: query
          required: true
          type: string
          description: "Proposed gamertag (3-16, A-Z a-z 0-9 _)"
      responses:
        200:
          description: "Availability"
          schema:
            $ref: "#/definitions/GamertagCheckResponse"
        400:
          description: "Invalid handle format"
          schema:
            $ref: "#/definitions/ApiError"
        429:
          description: "Rate limited"
          schema:
            $ref: "#/definitions/ApiError"

  /me/handle:
    post:
      tags: [Me, Gamertag]
      summary: "Set/lock-in gamertag (unique, permanent in VS1)"
      security:
        - BearerAuth: []
        - SessionCookie: []
      description: |
        Requires current honor code acceptance. Enforces case-insensitive uniqueness via handle_norm.
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: "#/definitions/SetHandleRequest"
      responses:
        200:
          description: "Handle set"
          schema:
            $ref: "#/definitions/MeResponse"
        401:
          description: "Not authenticated"
          schema:
            $ref: "#/definitions/ApiError"
        403:
          description: "Honor code required"
          schema:
            $ref: "#/definitions/ApiError"
        409:
          description: "Handle already taken"
          schema:
            $ref: "#/definitions/ApiError"

  /admin/users:
    get:
      tags: [Admin]
      summary: "Search users (admin/mod only)"
      security:
        - BearerAuth: []
        - SessionCookie: []
      parameters:
        - name: q
          in: query
          type: string
          required: false
          description: "Search by email, handle, or userId"
        - name: limit
          in: query
          type: integer
          required: false
          default: 50
      responses:
        200:
          description: "User list"
          schema:
            $ref: "#/definitions/AdminUserListResponse"
        401:
          description: "Not authenticated"
          schema:
            $ref: "#/definitions/ApiError"
        403:
          description: "Forbidden (not admin/mod)"
          schema:
            $ref: "#/definitions/ApiError"

  /admin/users/{user_id}:
    get:
      tags: [Admin]
      summary: "Get user detail (admin/mod only)"
      security:
        - BearerAuth: []
        - SessionCookie: []
      parameters:
        - name: user_id
          in: path
          required: true
          type: string
          description: "UUID string"
      responses:
        200:
          description: "User detail"
          schema:
            $ref: "#/definitions/AdminUserDetailResponse"
        401:
          description: "Not authenticated"
          schema:
            $ref: "#/definitions/ApiError"
        403:
          description: "Forbidden"
          schema:
            $ref: "#/definitions/ApiError"
        404:
          description: "Not found"
          schema:
            $ref: "#/definitions/ApiError"

  /admin/users/{user_id}/suspend:
    post:
      tags: [Admin]
      summary: "Suspend user (admin/mod only)"
      security:
        - BearerAuth: []
        - SessionCookie: []
      parameters:
        - name: user_id
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            $ref: "#/definitions/SuspendUserRequest"
      responses:
        200:
          description: "Suspended"
          schema:
            $ref: "#/definitions/AdminUserDetailResponse"
        401:
          description: "Not authenticated"
          schema:
            $ref: "#/definitions/ApiError"
        403:
          description: "Forbidden"
          schema:
            $ref: "#/definitions/ApiError"
        404:
          description: "Not found"
          schema:
            $ref: "#/definitions/ApiError"

  /admin/users/{user_id}/unsuspend:
    post:
      tags: [Admin]
      summary: "Unsuspend user (admin/mod only)"
      security:
        - BearerAuth: []
        - SessionCookie: []
      parameters:
        - name: user_id
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: false
          schema:
            $ref: "#/definitions/UnsuspendUserRequest"
      responses:
        200:
          description: "Unsuspended"
          schema:
            $ref: "#/definitions/AdminUserDetailResponse"
        401:
          description: "Not authenticated"
          schema:
            $ref: "#/definitions/ApiError"
        403:
          description: "Forbidden"
          schema:
            $ref: "#/definitions/ApiError"
        404:
          description: "Not found"
          schema:
            $ref: "#/definitions/ApiError"

  /admin/users/{user_id}/revoke_sessions:
    post:
      tags: [Admin]
      summary: "Revoke all sessions for a user (admin/mod only)"
      security:
        - BearerAuth: []
        - SessionCookie: []
      parameters:
        - name: user_id
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: false
          schema:
            $ref: "#/definitions/RevokeSessionsRequest"
      responses:
        200:
          description: "Sessions revoked"
          schema:
            $ref: "#/definitions/OkResponse"
        401:
          description: "Not authenticated"
          schema:
            $ref: "#/definitions/ApiError"
        403:
          description: "Forbidden"
          schema:
            $ref: "#/definitions/ApiError"
        404:
          description: "Not found"
          schema:
            $ref: "#/definitions/ApiError"

  /admin/users/{user_id}/set_handle:
    post:
      tags: [Admin]
      summary: "Admin override: set/rename user's handle (admin only recommended)"
      security:
        - BearerAuth: []
        - SessionCookie: []
      description: |
        Use sparingly. Enforces uniqueness, may be needed to resolve conflicts or moderation issues.
        Consider restricting to role=admin only (not mod) in implementation.
      parameters:
        - name: user_id
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            $ref: "#/definitions/AdminSetHandleRequest"
      responses:
        200:
          description: "Handle set"
          schema:
            $ref: "#/definitions/AdminUserDetailResponse"
        401:
          description: "Not authenticated"
          schema:
            $ref: "#/definitions/ApiError"
        403:
          description: "Forbidden"
          schema:
            $ref: "#/definitions/ApiError"
        409:
          description: "Handle taken"
          schema:
            $ref: "#/definitions/ApiError"

  /admin/handles/reserve:
    post:
      tags: [Admin]
      summary: "Reserve a handle (prevent users from claiming it)"
      security:
        - BearerAuth: []
        - SessionCookie: []
      description: |
        Creates a reservation so handle cannot be chosen. Useful for moderation/branding.
        Implementation can be a reserved_handles table with UNIQUE(handle_norm).
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: "#/definitions/ReserveHandleRequest"
      responses:
        200:
          description: "Reserved"
          schema:
            $ref: "#/definitions/OkResponse"
        401:
          description: "Not authenticated"
          schema:
            $ref: "#/definitions/ApiError"
        403:
          description: "Forbidden"
          schema:
            $ref: "#/definitions/ApiError"
        409:
          description: "Already reserved/taken"
          schema:
            $ref: "#/definitions/ApiError"

  /admin/audit:
    get:
      tags: [Admin]
      summary: "Read admin audit log (admin/mod)"
      security:
        - BearerAuth: []
        - SessionCookie: []
      parameters:
        - name: limit
          in: query
          type: integer
          required: false
          default: 100
        - name: cursor
          in: query
          type: string
          required: false
          description: "Pagination cursor (implementation-defined)"
      responses:
        200:
          description: "Audit entries"
          schema:
            $ref: "#/definitions/AdminAuditListResponse"
        401:
          description: "Not authenticated"
          schema:
            $ref: "#/definitions/ApiError"
        403:
          description: "Forbidden"
          schema:
            $ref: "#/definitions/ApiError"

definitions:
  HealthResponse:
    type: object
    properties:
      ok:
        type: boolean
      service:
        type: string
      time:
        type: string
    required: [ok]

  OkResponse:
    type: object
    properties:
      ok:
        type: boolean
      message:
        type: string
    required: [ok]

  ApiError:
    type: object
    properties:
      code:
        type: string
        example: "HONOR_CODE_REQUIRED"
      message:
        type: string
        example: "Honor code acceptance required."
      honor_code:
        $ref: "#/definitions/HonorCode"
      details:
        type: object
        additionalProperties: true

  AuthStartResponse:
    type: object
    properties:
      url:
        type: string
    required: [url]

  GoogleCallbackRequest:
    type: object
    properties:
      code:
        type: string
      redirect_uri:
        type: string
    required: [code, redirect_uri]

  EmailStartRequest:
    type: object
    properties:
      email:
        type: string
        example: "user@example.com"
      return_to:
        type: string
        description: "Optional return path after auth"
    required: [email]

  EmailStartResponse:
    type: object
    properties:
      ok:
        type: boolean
      message:
        type: string
        example: "If the email exists, a login link/code has been sent."
    required: [ok]

  EmailVerifyRequest:
    type: object
    properties:
      email:
        type: string
      token:
        type: string
        description: "Magic-link token (opaque) OR OTP code, depending on implementation"
      redirect_uri:
        type: string
        description: "Optional; used if token came from an OAuth-style redirect"
    required: [email, token]

  AuthCompleteResponse:
    type: object
    properties:
      token:
        type: string
        description: "JWT access token (optional if using cookie sessions)"
      user:
        $ref: "#/definitions/User"
      honor_code:
        $ref: "#/definitions/HonorCode"
    required: [user]

  MeResponse:
    type: object
    properties:
      user:
        $ref: "#/definitions/User"
      honor_code:
        $ref: "#/definitions/HonorCode"
    required: [user]

  User:
    type: object
    properties:
      id:
        type: string
        description: "UUID string"
      status:
        type: string
        enum: [pending_email_verify, pending_honor, active, suspended, deleted]
      email:
        type: string
      display_name:
        type: string
      handle:
        type: string
        description: "Gamertag / character name"
      avatar_url:
        type: string
      roles:
        type: array
        items:
          type: string
        example: ["user"]
      created_at:
        type: string
      updated_at:
        type: string

  HonorCode:
    type: object
    properties:
      required:
        type: boolean
      title:
        type: string
        example: "THE_HONOR_CODE"
      body_markdown:
        type: string
      sha256:
        type: string
        description: "SHA-256 hash of canonical honor code markdown"
      version:
        type: string
        example: "2026-02-22"

  HonorCodeResponse:
    type: object
    properties:
      honor_code:
        $ref: "#/definitions/HonorCode"
    required: [honor_code]

  HonorCodeAcceptRequest:
    type: object
    properties:
      sha256:
        type: string
    required: [sha256]

  GamertagCheckResponse:
    type: object
    properties:
      available:
        type: boolean
      reason:
        type: string
        example: "Taken"
    required: [available]

  SetHandleRequest:
    type: object
    properties:
      handle:
        type: string
        example: "LASVEGASEMILY89"
    required: [handle]

  AdminUserListResponse:
    type: object
    properties:
      users:
        type: array
        items:
          $ref: "#/definitions/AdminUserSummary"
      next_cursor:
        type: string
    required: [users]

  AdminUserSummary:
    type: object
    properties:
      id:
        type: string
      email:
        type: string
      handle:
        type: string
      status:
        type: string
      roles:
        type: array
        items:
          type: string

  AdminUserDetailResponse:
    type: object
    properties:
      user:
        $ref: "#/definitions/User"
      identities:
        type: array
        items:
          $ref: "#/definitions/UserIdentity"
      honor_acceptances:
        type: array
        items:
          $ref: "#/definitions/HonorAcceptance"
      sessions:
        type: array
        items:
          $ref: "#/definitions/SessionInfo"
    required: [user]

  UserIdentity:
    type: object
    properties:
      provider:
        type: string
        example: "google"
      provider_subject:
        type: string
      email:
        type: string
      email_verified:
        type: boolean
      created_at:
        type: string
      last_login_at:
        type: string

  HonorAcceptance:
    type: object
    properties:
      version:
        type: string
      sha256:
        type: string
      accepted_at:
        type: string

  SessionInfo:
    type: object
    properties:
      session_id:
        type: string
      created_at:
        type: string
      expires_at:
        type: string
      revoked_at:
        type: string
      ip_hash:
        type: string
      ua_hash:
        type: string

  SuspendUserRequest:
    type: object
    properties:
      reason:
        type: string
        example: "Abusive behavior"
      until:
        type: string
        description: "Optional ISO timestamp for temporary suspension"
    required: [reason]

  UnsuspendUserRequest:
    type: object
    properties:
      reason:
        type: string
        example: "Appeal accepted"

  RevokeSessionsRequest:
    type: object
    properties:
      reason:
        type: string

  AdminSetHandleRequest:
    type: object
    properties:
      handle:
        type: string
      reason:
        type: string
    required: [handle]

  ReserveHandleRequest:
    type: object
    properties:
      handle:
        type: string
      reason:
        type: string
    required: [handle]

  AdminAuditListResponse:
    type: object
    properties:
      entries:
        type: array
        items:
          $ref: "#/definitions/AdminAuditEntry"
      next_cursor:
        type: string
    required: [entries]

  AdminAuditEntry:
    type: object
    properties:
      id:
        type: string
      actor_user_id:
        type: string
      action:
        type: string
        example: "SUSPEND_USER"
      target_user_id:
        type: string
      reason:
        type: string
      created_at:
        type: string
      meta:
        type: object
        additionalProperties: true
