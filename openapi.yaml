swagger: "2.0"
info:
  version: "1.0.0"
  title: "IDUNA Platform IAM + Governance API"
  description: |
    IDUNA is the FARTHQ central trust authority. Consumer services trust IDUNA-issued
    JWTs, not external OAuth providers directly. This contract documents the implemented
    IAM surface: Google ID token exchange, agent machine-to-machine credential exchange,
    JWKS publication, unified identity entitlements, and Apples golden documentation log
    streaming.

schemes:
  - https
  - http
host: "api.example.com"
basePath: "/"
consumes:
  - application/json
produces:
  - application/json

securityDefinitions:
  BearerAuth:
    type: apiKey
    name: Authorization
    in: header
    description: "Bearer <IDUNA-issued JWT>"

tags:
  - name: Health
  - name: Auth
  - name: JWKS
  - name: Identity
  - name: Apples
  - name: BackOffice

paths:
  /health:
    get:
      tags: [Health]
      summary: "Health check"
      responses:
        200:
          description: "OK"
          schema:
            $ref: "#/definitions/HealthResponse"

  /api/v1/auth/google:
    post:
      tags: [Auth]
      summary: "Exchange a Google ID token for an IDUNA ecosystem JWT"
      description: |
        Verifies the external Google identity assertion, resolves or creates the local
        IDUNA user, rejects suspended or banned identities, flattens RBAC permissions,
        and signs a one-hour IDUNA JWT for downstream FARTHQ services.
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: "#/definitions/GoogleTokenRequest"
      responses:
        200:
          description: "Authenticated"
          schema:
            $ref: "#/definitions/TokenResponse"
        400:
          description: "Missing or malformed id_token"
          schema:
            $ref: "#/definitions/ApiError"
        401:
          description: "Google ID token failed verification"
          schema:
            $ref: "#/definitions/ApiError"
        403:
          description: "Identity is suspended or banned"
          schema:
            $ref: "#/definitions/ApiError"

  /api/v1/auth/agent:
    post:
      tags: [Auth]
      summary: "Exchange agent M2M credentials for an IDUNA ecosystem JWT"
      description: |
        Authenticates an ACTIVE agent by name and plaintext secret. The returned JWT
        carries the agent subject, name, type, and effective permissions such as
        apples.write or apples.read.
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: "#/definitions/AgentTokenRequest"
      responses:
        200:
          description: "Authenticated agent"
          schema:
            $ref: "#/definitions/TokenResponse"
        400:
          description: "Missing agent_name or agent_secret"
          schema:
            $ref: "#/definitions/ApiError"
        401:
          description: "Invalid agent credentials"
          schema:
            $ref: "#/definitions/ApiError"

  /.well-known/jwks.json:
    get:
      tags: [JWKS]
      summary: "Public signing key set"
      description: "Returns the ES256 JWKS used by downstream services to validate IDUNA-issued JWTs."
      responses:
        200:
          description: "JWKS"
          schema:
            type: object
            additionalProperties: true

  /api/v1/jwks:
    get:
      tags: [JWKS]
      summary: "Public signing key set alias"
      description: "Compatibility alias for consumers that expect the JWKS under /api/v1."
      responses:
        200:
          description: "JWKS"
          schema:
            type: object
            additionalProperties: true

  /api/v1/identities/me:
    get:
      tags: [Identity]
      summary: "Get the current identity and effective entitlements"
      security:
        - BearerAuth: []
      description: "Requires a valid IDUNA JWT and iduna.me.read permission."
      responses:
        200:
          description: "Unified identity and RBAC profile"
          schema:
            $ref: "#/definitions/MeResponse"
        401:
          description: "Missing or invalid bearer token"
          schema:
            $ref: "#/definitions/ApiError"
        403:
          description: "Missing iduna.me.read permission"
          schema:
            $ref: "#/definitions/ApiError"
        404:
          description: "Identity not found"
          schema:
            $ref: "#/definitions/ApiError"

  /api/v1/apples:
    post:
      tags: [Apples]
      summary: "Publish an Apple golden documentation record"
      security:
        - BearerAuth: []
      description: |
        Requires apples.write permission. The authenticated JWT subject is recorded as
        agent_id; clients do not provide agent_id in the body. The store appends the
        Apple and emits ApplePublished into iam_event_stream in the same transaction.
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: "#/definitions/AppleCreateRequest"
      responses:
        201:
          description: "Apple recorded"
          schema:
            $ref: "#/definitions/AppleCreateResponse"
        400:
          description: "Invalid JSON or missing required fields"
          schema:
            $ref: "#/definitions/ApiError"
        401:
          description: "Missing or invalid bearer token"
          schema:
            $ref: "#/definitions/ApiError"
        403:
          description: "Missing apples.write permission"
          schema:
            $ref: "#/definitions/ApiError"
    get:
      tags: [Apples]
      summary: "List Apples"
      security:
        - BearerAuth: []
      description: "Requires apples.read or apples.admin permission. List responses omit body and metadata."
      parameters:
        - name: agent_id
          in: query
          type: string
          required: false
        - name: source_repo
          in: query
          type: string
          required: false
        - name: apple_type
          in: query
          type: string
          required: false
        - name: limit
          in: query
          type: integer
          required: false
          default: 50
          maximum: 500
      responses:
        200:
          description: "Apple list"
          schema:
            $ref: "#/definitions/AppleListResponse"
        401:
          description: "Missing or invalid bearer token"
          schema:
            $ref: "#/definitions/ApiError"
        403:
          description: "Missing apples.read permission"
          schema:
            $ref: "#/definitions/ApiError"

  /api/v1/apples/{id}:
    get:
      tags: [Apples]
      summary: "Get a full Apple by ID"
      security:
        - BearerAuth: []
      description: "Requires apples.read or apples.admin permission. Returns body and metadata."
      parameters:
        - name: id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: "Apple detail"
          schema:
            $ref: "#/definitions/AppleDetail"
        400:
          description: "Invalid Apple ID"
          schema:
            $ref: "#/definitions/ApiError"
        401:
          description: "Missing or invalid bearer token"
          schema:
            $ref: "#/definitions/ApiError"
        403:
          description: "Missing apples.read permission"
          schema:
            $ref: "#/definitions/ApiError"
        404:
          description: "Apple not found"
          schema:
            $ref: "#/definitions/ApiError"

  /admin:
    get:
      tags: [BackOffice]
      summary: "Back Office overview HTML"
      security:
        - BearerAuth: []
      produces:
        - text/html
      responses:
        200:
          description: "Administrative overview"
        401:
          description: "Missing or invalid bearer token"
        403:
          description: "Missing iduna.admin permission"

  /admin/users:
    get:
      tags: [BackOffice]
      summary: "Back Office users ledger HTML"
      security:
        - BearerAuth: []
      produces:
        - text/html
      responses:
        200:
          description: "Users ledger"

  /admin/agents:
    get:
      tags: [BackOffice]
      summary: "Back Office agent registry HTML"
      security:
        - BearerAuth: []
      produces:
        - text/html
      responses:
        200:
          description: "Agent registry"

  /admin/audit:
    get:
      tags: [BackOffice]
      summary: "Back Office IAM event audit stream HTML"
      security:
        - BearerAuth: []
      produces:
        - text/html
      responses:
        200:
          description: "Audit event ledger"

  /admin/apples:
    get:
      tags: [BackOffice]
      summary: "Back Office Apples ledger HTML"
      security:
        - BearerAuth: []
      produces:
        - text/html
      parameters:
        - name: agent_id
          in: query
          type: string
          required: false
        - name: source_repo
          in: query
          type: string
          required: false
        - name: apple_type
          in: query
          type: string
          required: false
      responses:
        200:
          description: "Apples ledger"

  /admin/apples/{id}:
    get:
      tags: [BackOffice]
      summary: "Back Office Apple detail HTML"
      security:
        - BearerAuth: []
      produces:
        - text/html
      parameters:
        - name: id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: "Apple detail"
        404:
          description: "Apple not found"

definitions:
  HealthResponse:
    type: object
    properties:
      ok:
        type: boolean
        example: true
    required: [ok]

  ApiError:
    type: object
    properties:
      code:
        type: string
        example: "BAD_REQUEST"
      message:
        type: string
        example: "id_token is required"
    required: [code, message]

  GoogleTokenRequest:
    type: object
    properties:
      id_token:
        type: string
        description: "Google OpenID Connect ID token"
    required: [id_token]

  AgentTokenRequest:
    type: object
    properties:
      agent_name:
        type: string
        example: "EMILY_PRIME"
      agent_secret:
        type: string
        format: password
    required: [agent_name, agent_secret]

  TokenResponse:
    type: object
    properties:
      success:
        type: boolean
        example: true
      token_type:
        type: string
        example: "Bearer"
      access_token:
        type: string
      expires_in:
        type: integer
        example: 3600
    required: [success, token_type, access_token, expires_in]

  MeResponse:
    type: object
    properties:
      identity:
        $ref: "#/definitions/IdentityProfile"
      rbac:
        $ref: "#/definitions/RBACProfile"
      meta:
        $ref: "#/definitions/IdentityMeta"
    required: [identity, rbac, meta]

  IdentityProfile:
    type: object
    properties:
      id:
        type: string
      email:
        type: string
      gamertag:
        type: string
      status:
        type: string
        enum: [ACTIVE, SUSPENDED, BANNED, PENDING]
    required: [id, email, status]

  RBACProfile:
    type: object
    properties:
      assigned_roles:
        type: array
        items:
          type: string
      effective_permissions:
        type: array
        items:
          type: string
    required: [assigned_roles, effective_permissions]

  IdentityMeta:
    type: object
    properties:
      server_epoch:
        type: integer
      authority_signature_cluster:
        type: string
        example: "https://iam.farthq.internal/.well-known/jwks.json"
    required: [server_epoch, authority_signature_cluster]

  AppleCreateRequest:
    type: object
    properties:
      source_repo:
        type: string
        example: "iduna"
      run_id:
        type: string
        example: "trace_abc123"
      apple_type:
        type: string
        enum: [improvement, observation, incident, release, audit]
      title:
        type: string
      body:
        type: string
        description: "Markdown or plain-text golden documentation body"
      metadata:
        type: object
        additionalProperties: true
    required: [source_repo, run_id, apple_type, title, body]

  AppleCreateResponse:
    type: object
    properties:
      id:
        type: integer
        format: int64
      recorded_at:
        type: string
        format: date-time
    required: [id, recorded_at]

  AppleListResponse:
    type: object
    properties:
      apples:
        type: array
        items:
          $ref: "#/definitions/AppleListItem"
    required: [apples]

  AppleListItem:
    type: object
    properties:
      id:
        type: integer
        format: int64
      agent_id:
        type: string
      source_repo:
        type: string
      run_id:
        type: string
      apple_type:
        type: string
      title:
        type: string
      recorded_at:
        type: string
        format: date-time
    required: [id, agent_id, source_repo, run_id, apple_type, title, recorded_at]

  AppleDetail:
    type: object
    properties:
      id:
        type: integer
        format: int64
      agent_id:
        type: string
      source_repo:
        type: string
      run_id:
        type: string
      apple_type:
        type: string
      title:
        type: string
      body:
        type: string
      metadata:
        type: object
        additionalProperties: true
      recorded_at:
        type: string
        format: date-time
    required: [id, agent_id, source_repo, run_id, apple_type, title, body, recorded_at]
