# iduna.farthq.com — EDIS/WordPress + IDUNA API/ceremony path split.
# Generated by ops/install.sh originally; this version adds the four
# already-drafted IDUNA location blocks from
# ops/nginx-front-door-snippet.conf, ABOVE the WordPress catch-all
# `location /`, per docs/kikoryu/FRONT_DOOR_FUNNEL.md §7 step 6.
#
# Deployed via sudo-queue/07-iduna-front-door-nginx.sh — do not hand-edit
# the live /etc/nginx/sites-available/edis without also updating this file,
# they are meant to stay identical.

limit_req_zone $binary_remote_addr zone=edis_rl:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=edis_admin_rl:10m rate=2r/s;

server {
    listen 80;
    listen [::]:80;
    server_name iduna.farthq.com www.iduna.farthq.com;

    root  /var/www/edis;
    index index.php;
    charset utf-8;

    gzip on;
    gzip_types text/html text/css application/json application/javascript text/xml;
    gzip_min_length 1024;

    location /.well-known/acme-challenge/ { root /var/www/html; }

    location ~* /(?:xmlrpc\.php|wp-config\.php|readme\.html|license\.txt) { deny all; return 404; }
    location ~ /\.(?!well-known\/) { deny all; }
    location ~* /wp-content/uploads/.*\.php$ { deny all; return 404; }

    location ~ ^/wp-(admin|login) {
        limit_req zone=edis_admin_rl burst=5 nodelay;
        try_files $uri $uri/ /index.php?$args;
        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass unix:/run/php/php8.3-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|webp|svg|woff2|woff|ttf|eot)$ {
        expires 1y; add_header Cache-Control "public, immutable"; access_log off;
        try_files $uri =404;
    }

    # ── IDUNA front-door path split (docs/kikoryu/FRONT_DOOR_FUNNEL.md §7 step 6) ──
    # These four location blocks are longest-prefix/exact matches that nginx
    # will always prefer over the WordPress catch-all below, regardless of
    # ordering — kept here, above it, for human readability only.

    # IDUNA API surface — all versioned endpoints
    location /api/v1/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # JWKS — public key discovery, must NOT require auth
    location = /.well-known/jwks.json {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }

    # Device auth polling + VS0 web ceremony (bare /auth/ + /me + /honor-code/
    # + /gamertag/ + /device — see internal/http/handlers/web_ceremony.go)
    location /auth/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /me {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /me/handle {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /honor-code/accept {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /gamertag/check {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }
    location /device {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Back Office admin UI
    location /admin/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /admin/login {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://127.0.0.1:8080;
    }
    # ── end IDUNA path split ──

    location / {
        limit_req zone=edis_rl burst=40 nodelay;
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_PROXY "";
        fastcgi_read_timeout 60s;
    }

    location = /robots.txt  { log_not_found off; access_log off; }
    location = /favicon.ico { log_not_found off; access_log off; }
}
