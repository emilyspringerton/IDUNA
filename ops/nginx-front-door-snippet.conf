# IDUNA front-door path-based split on iduna.farthq.com — ready to apply.
#
# Insert these location blocks into /etc/nginx/sites-available/edis, ABOVE
# the existing catch-all `location / { try_files $uri $uri/ /index.php?$args; }`
# block (nginx matches longest-prefix, but IDUNA's exact-match /{$} case needs
# explicit handling — see the root-path note at the bottom).
#
# Then: sudo nginx -t && sudo systemctl reload nginx
# Then (once this lands and DNS/nginx are confirmed serving both cleanly):
#   sudo certbot --nginx -d iduna.farthq.com -d www.iduna.farthq.com
# certbot will rewrite the server block to add the 443/SSL half automatically —
# do the path-based split FIRST, cert issuance SECOND, so certbot's rewrite
# captures the final location set rather than needing a second edit pass.

    # IDUNA API surface — all versioned endpoints
    location /api/v1/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # JWKS — public key discovery, must NOT require auth
    location = /.well-known/jwks.json {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }

    # Device auth polling (game/client handoff) — bare /auth/, no /api/v1 prefix
    location /auth/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Back Office admin UI
    location /admin/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /admin/login {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://127.0.0.1:8080;
    }

# ── ROOT PATH — decided 2026-07-16, not yet drafted into a location block ──
#
# IDUNA also serves its OWN static frontend at bare `/` (main.go:210,
# `GET /{$} -> index.html`, plus /app.js, /styles.css, /event-stream/) — the
# actual human-facing Unagent funnel UI (Honor Code acceptance screen,
# gamertag claim). WordPress's existing catch-all also owns `/`.
#
# Decision: this ceremony surface is the single most security-sensitive
# moment in the system and must never route through PHP/WordPress, even for
# static markup (a compromised WP install could inject JS into the honor-code
# page and subvert the consent ceremony itself). IDUNA keeps its own frontend,
# served straight from the Go binary. Exact mechanism (dedicated location
# block ahead of WordPress's catch-all on this same domain, vs. a fully
# separate subdomain) is Fable's call to make with full nginx-config context —
# see EMILY/docs/fable-prompts/iduna-front-door-funnel.md, which owns this
# decision now. Don't resolve it here piecemeal; the four location blocks
# above are safe to apply either way, they don't touch `location /`.
#
# "Harden EDIS/WordPress enough to someday trust it with identity-adjacent
# surfaces" is a legitimate separate bet, already tracked at
# EMILY/BACKLOG.md SECTION 35 (EDIS DIS PRODUCTION HARDENING) — not a
# blocker for shipping this funnel now.
